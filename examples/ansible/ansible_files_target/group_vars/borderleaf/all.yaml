routing_instances:
  _merge_directive: merge_recursive
  _merge_list_directives:
    instance:
      _merge_directive: merge_by_key
      _merge_key: name
  instance:
  - route_distinguisher: {}
    name: VRF_10001
  - route_distinguisher: {}
    name: VRF_10002
  - route_distinguisher: {}
    name: VRF_10003