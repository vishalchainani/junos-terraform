interfaces:
  interface:
  - unit:
    - family:
        inet: {}
      name: '1'
    - family:
        inet: {}
      name: '2'
    - family:
        inet: {}
      name: '3'
    name: xe-0/0/2
  - unit:
    - family:
        inet: {}
      name: '1'
    - family:
        inet: {}
      name: '2'
    - family:
        inet: {}
      name: '3'
    name: xe-0/0/3
  - unit:
    - family:
        inet: {}
      name: '0'
    name: xe-0/0/4
  - unit:
    - family:
        inet: {}
      name: '10001'
    - family:
