protocols:
  igmp_snooping:
    vlan:
    - name: default
  bgp:
    group:
    - type: internal
      name: EVPN_iBGP
      family:
        evpn:
          signaling: ''
      multipath: ''
      local_as:
        as_number: '65200'
    - type: external
      bfd_liveness_detection:
        minimum_interval: '1000'
        multiplier: '3'
      name: IPCLOS_eBGP
      export: IPCLOS_BGP_EXP
      mtu_discovery: true
      multipath:
        multiple_as: true
      import: IPCLOS_BGP_IMP
      vpn_apply_export: true
version: 18.1R3-S5.3
routing_options:
  forwarding_table:
    ecmp_fast_reroute: true
    export: PFE-LB
forwarding_options:
  storm_control_profiles:
  - all: ''
    name: default
policy_options:
  policy_statement:
  - term:
    - from:
        protocol: bgp
      then:
        community:
        - add: true
        accept: true
      name: loopback
    - then:
        reject: true
      name: default
    name: IPCLOS_BGP_EXP
  - term:
    - from:
        protocol: direct
      name: loopback
      then:
        accept: true
    - name: default
      then:
        reject: true
    name: IPCLOS_BGP_IMP
  - then:
      load_balance:
        per_packet: true
    name: PFE-LB
interfaces:
  interface:
  - name: xe-0/0/0
    unit:
    - name: '0'
  - name: xe-0/0/1
    unit:
    - name: '0'
  - name: xe-0/0/2
  - name: em0
    unit:
    - name: '0'
      description: '*** management ***'
  - name: em1
    unit:
    - description: '*** to pfe ***'
      family:
        inet:
          address:
          - name: 169.254.0.2/24
      name: '0'
  - name: lo0
    unit:
    - name: '0'
      description: '*** loopback ***'
system:
  syslog:
    file:
    - contents:
      - notice: true
        name: any
      name: messages
  extensions:
    providers:
    - license_type:
      - deployment_scope: commercial
        name: juniper
      name: juniper
    - license_type:
      - deployment_scope: commercial
        name: juniper
      name: chef
