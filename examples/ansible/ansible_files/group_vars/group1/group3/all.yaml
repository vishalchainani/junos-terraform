protocols:
  evpn:
    default_gateway: do-not-advertise
    encapsulation: vxlan
    multicast_mode: ingress-replication
    extended_vni_list: all
  bgp:
    group:
    - neighbor:
      - name: 10.30.100.3
      - name: 10.30.100.4
      name: EVPN_iBGP
routing_options:
  forwarding_table:
    chained_composite_next_hop:
      ingress:
        evpn: true
vlans:
  vlan:
  - l3_interface: irb.1001
    name: vlan_1001
    vlan_id: '1001'
    vxlan:
      vni: '1001'
  - l3_interface: irb.2001
    name: vlan_2001
    vlan_id: '2001'
    vxlan:
      vni: '2001'
  - l3_interface: irb.3001
    name: vlan_3001
    vlan_id: '3001'
    vxlan:
      vni: '3001'
policy_options:
  policy_statement:
  - term:
    - from:
        protocol: direct
      name: fm_direct
      then:
        accept: true
    - from:
        protocol: static
      name: fm_static
      then:
        accept: true
    - from:
        protocol: evpn
        route_filter:
        - address: 0.0.0.0/0
          prefix_length_range: /32-/32
      name: fm_v4_host
      then:
        accept: true
    - from:
        protocol: evpn
        route_filter:
        - address: 0::0/0
          prefix_length_range: /128-/128
      name: fm_v6_host
      then:
        accept: true
    name: EVPN_T5_EXPORT
routing_instances:
  instance:
  - protocols:
      evpn:
        ip_prefix_routes:
          vni: '10001'
          encapsulation: vxlan
          advertise: direct-nexthop
          export: EVPN_T5_EXPORT
    vrf_table_label: ''
    routing_options:
      auto_export: ''
    instance_type: vrf
    interface:
    - name: irb.1001
    - name: lo0.10001
    name: VRF_10001
    vrf_target:
      community: target:1:10001
  - protocols:
      evpn:
        ip_prefix_routes:
          vni: '10002'
          encapsulation: vxlan
          advertise: direct-nexthop
          export: EVPN_T5_EXPORT
    vrf_table_label: ''
    routing_options:
      auto_export: ''
    instance_type: vrf
    interface:
    - name: irb.2001
    - name: lo0.10002
    name: VRF_10002
    vrf_target:
      community: target:1:10002
  - protocols:
      evpn:
        ip_prefix_routes:
          vni: '10003'
          encapsulation: vxlan
          advertise: direct-nexthop
          export: EVPN_T5_EXPORT
    vrf_table_label: ''
    routing_options:
      auto_export: ''
    instance_type: vrf
    interface:
    - name: irb.3001
    - name: lo0.10003
    name: VRF_10003
    vrf_target:
      community: target:1:10003
interfaces:
  interface:
  - description: '*** to dc1-spine1 ***'
    name: xe-0/0/0
  - description: '*** to dc1-spine2 ***'
    name: xe-0/0/1
  - ether_options:
      ieee_802_3ad:
        bundle: ae0
    name: xe-0/0/2
  - aggregated_ether_options:
      lacp:
        active: true
        periodic: fast
    name: ae0
    esi:
      all_active: true
    unit:
    - name: '0'
  - name: irb
    unit:
    - family:
        inet:
          address:
          - name: 10.1.1.1/24
      mac: 02:0a:01:01:01:18
      name: '1001'
    - family:
        inet:
          address:
          - name: 10.2.1.1/24
      mac: 02:0a:02:01:01:18
      name: '2001'
    - family:
        inet:
          address:
          - name: 10.3.1.1/24
      mac: 02:0a:03:01:01:18
      name: '3001'
  - unit:
    - name: '10001'
      description: Loopback for VXLAN control packets for VRF_10001
    - name: '10002'
      description: Loopback for VXLAN control packets for VRF_10002
    - name: '10003'
      description: Loopback for VXLAN control packets for VRF_10003
    name: lo0
switch_options:
  vrf_target:
    community: target:9999:9999
    auto: ''
  vtep_source_interface:
    interface_name: lo0.0
