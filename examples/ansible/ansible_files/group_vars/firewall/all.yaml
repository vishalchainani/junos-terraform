security:
  log:
    mode: stream
    report: ''
  zones:
    security_zone:
    - host_inbound_traffic:
        protocols:
        - name: all
        system_services:
        - name: all
      name: trust
      tcp_rst: true
    - name: untrust
      screen: untrust-screen
    - host_inbound_traffic:
        protocols:
        - name: all
        system_services:
        - name: all
      interfaces:
      - name: ge-0/0/0.1
      - name: ge-0/0/1.1
      name: VRF_10001
    - host_inbound_traffic:
        protocols:
        - name: all
        system_services:
        - name: all
      interfaces:
      - name: ge-0/0/0.2
      - name: ge-0/0/1.2
      name: VRF_10002
    - host_inbound_traffic:
        protocols:
        - name: all
        system_services:
        - name: all
      interfaces:
      - name: ge-0/0/0.3
      - name: ge-0/0/1.3
      name: VRF_10003
  screen:
    ids_option:
    - icmp:
        ping_death: true
      ip:
        source_route_option: true
        tear_drop: true
      name: untrust-screen
      tcp:
        land: true
        syn_flood:
          alarm_threshold: '1024'
          attack_threshold: '200'
          destination_threshold: '2048'
          source_threshold: '1024'
          timeout: '20'
          undocumented:
            queue_size: '2000'
  policies:
    policy:
    - from_zone_name: trust
      policy:
      - match:
          application: any
          destination_address: any
          source_address: any
        name: default-permit
        then:
          permit: ''
      to_zone_name: trust
    - from_zone_name: trust
      policy:
      - match:
          application: any
          destination_address: any
          source_address: any
        name: default-permit
        then:
          permit: ''
      to_zone_name: untrust
    - from_zone_name: VRF_10001
      policy:
      - match:
          application: any
          destination_address: any
          source_address: any
        name: default-permit
        then:
          permit: ''
      to_zone_name: VRF_10002
    - from_zone_name: VRF_10002
      policy:
      - match:
          application: any
          destination_address: any
          source_address: any
        name: default-permit
        then:
          permit: ''
      to_zone_name: VRF_10001
    - from_zone_name: VRF_10002
      policy:
      - match:
          application: any
          destination_address: any
          source_address: any
        name: default-permit
        then:
          permit: ''
      to_zone_name: VRF_10003
    - from_zone_name: VRF_10003
      policy:
      - match:
          application: any
          destination_address: any
          source_address: any
        name: default-permit
        then:
          permit: ''
      to_zone_name: VRF_10002
policy_options:
  policy_statement:
  - name: ospf-default
    term:
    - from:
        route_filter:
        - accept: true
          address: 0.0.0.0/0
          exact: true
      name: '1'
interfaces:
  interface:
  - name: ge-0/0/0
    unit:
    - description: '*** to dc1-borderleaf1 vlan 1 ***'
      vlan_id: '1'
      name: '1'
    - description: '*** to dc1-borderleaf1 vlan 2 ***'
      vlan_id: '2'
      name: '2'
    - description: '*** to dc1-borderleaf1 vlan 3 ***'
      vlan_id: '3'
      name: '3'
    vlan_tagging: true
  - name: ge-0/0/1
    unit:
    - description: '*** to dc1-borderleaf2 vlan 1 ***'
      vlan_id: '1'
      name: '1'
    - description: '*** to dc1-borderleaf2 vlan 2 ***'
      vlan_id: '2'
      name: '2'
    - description: '*** to dc1-borderleaf2 vlan 3 ***'
      vlan_id: '3'
      name: '3'
    vlan_tagging: true
  - name: fxp0
    unit:
    - description: '*** management ***'
      name: '0'
routing_instances:
  instance:
  - instance_type: virtual-router
    interface:
    - name: ge-0/0/0.1
    - name: ge-0/0/0.2
    - name: ge-0/0/0.3
    - name: ge-0/0/1.1
    - name: ge-0/0/1.2
    - name: ge-0/0/1.3
    name: fabric
    protocols:
      ospf:
        area:
        - interface:
          - name: ge-0/0/0.1
          - name: ge-0/0/1.1
          - name: ge-0/0/0.2
          - name: ge-0/0/1.2
          - name: ge-0/0/0.3
          - name: ge-0/0/1.3
          name: 0.0.0.0
        export: ospf-default
    routing_options:
      static:
        route:
        - discard: true
          name: 0.0.0.0/0
version: 18.2R3.4
system:
  license:
    autoupdate:
      url:
      - name: https://ae1.juniper.net/junos/key_retrieval
  syslog:
    file:
    - contents:
      - any: true
        name: any
      name: messages
_merge_directive: merge_recursive
