system:
  host_name: dc2-firewall1
security:
  policies:
    policy:
    - from_zone_name: trust
      to_zone_name: trust
      policy:
      - name: default-permit
        match:
          source_address: any
          destination_address: any
          application: any
        then:
          permit: ''
    - from_zone_name: trust
      to_zone_name: untrust
      policy:
      - name: default-permit
        match:
          source_address: any
          destination_address: any
          application: any
        then:
          permit: ''
  zones:
    security_zone:
    - name: trust
      tcp_rst: true
      host_inbound_traffic:
        system_services:
        - name: all
        protocols:
        - name: all
    - name: untrust
      screen: untrust-screen
    - name: VRF_10001
      host_inbound_traffic:
        system_services:
        - name: all
        protocols:
        - name: all
      interfaces:
      - name: ge-0/0/0.1
      - name: ge-0/0/1.1
interfaces:
  interface:
  - name: ge-0/0/0
    vlan_tagging: true
    unit:
    - name: '1'
      description: '*** to dc2-spine1 vlan 1 ***'
      vlan_id: '1'
      family:
        inet:
          address:
          - name: 10.95.1.2/30
  - name: ge-0/0/1
    vlan_tagging: true
    unit:
    - name: '1'
      description: '*** to dc2-spine2 vlan 1 ***'
      vlan_id: '1'
      family:
        inet:
          address:
          - name: 10.93.1.2/30
  - name: fxp0
    unit:
    - name: '0'
      description: '*** management ***'
      family:
        inet:
          address:
          - name: 100.123.26.3/16
routing_instances:
  instance:
  - name: fabric
    instance_type: virtual-router
    interface:
    - name: ge-0/0/0.1
    - name: ge-0/0/1.1
    routing_options:
      static:
        route:
        - name: 0.0.0.0/0
          discard: true
    protocols:
      ospf:
        export: ospf-default
        area:
        - name: 0.0.0.0
          interface:
          - name: ge-0/0/0.1
          - name: ge-0/0/1.1
