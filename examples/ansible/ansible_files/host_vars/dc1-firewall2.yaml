system:
  host_name: dc1-firewall2
security:
  policies:
    policy:
    - from_zone_name: trust
      to_zone_name: trust
      policy:
      - name: default-permit
        match:
          source_address: any
          destination_address: any
          application: any
        then:
          permit: ''
    - from_zone_name: trust
      to_zone_name: untrust
      policy:
      - name: default-permit
        match:
          source_address: any
          destination_address: any
          application: any
        then:
          permit: ''
    - from_zone_name: VRF_10001
      to_zone_name: VRF_10002
      policy:
      - name: default-permit
        match:
          source_address: any
          destination_address: any
          application: any
        then:
          permit: ''
    - from_zone_name: VRF_10002
      to_zone_name: VRF_10001
      policy:
      - name: default-permit
        match:
          source_address: any
          destination_address: any
          application: any
        then:
          permit: ''
    - from_zone_name: VRF_10002
      to_zone_name: VRF_10003
      policy:
      - name: default-permit
        match:
          source_address: any
          destination_address: any
          application: any
        then:
          permit: ''
    - from_zone_name: VRF_10003
      to_zone_name: VRF_10002
      policy:
      - name: default-permit
        match:
          source_address: any
          destination_address: any
          application: any
        then:
          permit: ''
  zones:
    security_zone:
    - name: trust
      tcp_rst: true
      host_inbound_traffic:
        system_services:
        - name: all
        protocols:
        - name: all
    - name: untrust
      screen: untrust-screen
    - name: VRF_10001
      host_inbound_traffic:
        system_services:
        - name: all
        protocols:
        - name: all
      interfaces:
      - name: ge-0/0/0.1
      - name: ge-0/0/1.1
    - name: VRF_10002
      host_inbound_traffic:
        system_services:
        - name: all
        protocols:
        - name: all
      interfaces:
      - name: ge-0/0/0.2
      - name: ge-0/0/1.2
    - name: VRF_10003
      host_inbound_traffic:
        system_services:
        - name: all
        protocols:
        - name: all
      interfaces:
      - name: ge-0/0/0.3
      - name: ge-0/0/1.3
interfaces:
  interface:
  - name: ge-0/0/0
    vlan_tagging: true
    unit:
    - name: '1'
      description: '*** to dc1-borderleaf1 vlan 1 ***'
      vlan_id: '1'
      family:
        inet:
          address:
          - name: 10.98.1.2/30
    - name: '2'
      description: '*** to dc1-borderleaf1 vlan 2 ***'
      vlan_id: '2'
      family:
        inet:
          address:
          - name: 10.98.2.2/30
    - name: '3'
      description: '*** to dc1-borderleaf1 vlan 3 ***'
      vlan_id: '3'
      family:
        inet:
          address:
          - name: 10.98.3.2/30
  - name: ge-0/0/1
    vlan_tagging: true
    unit:
    - name: '1'
      description: '*** to dc1-borderleaf2 vlan 1 ***'
      vlan_id: '1'
      family:
        inet:
          address:
          - name: 10.96.1.2/30
    - name: '2'
      description: '*** to dc1-borderleaf2 vlan 2 ***'
      vlan_id: '2'
      family:
        inet:
          address:
          - name: 10.96.2.2/30
    - name: '3'
      description: '*** to dc1-borderleaf2 vlan 3 ***'
      vlan_id: '3'
      family:
        inet:
          address:
          - name: 10.96.3.2/30
  - name: fxp0
    unit:
    - name: '0'
      description: '*** management ***'
      family:
        inet:
          address:
          - name: 100.123.26.2/16
routing_instances:
  instance:
  - name: fabric
    instance_type: virtual-router
    interface:
    - name: ge-0/0/0.1
    - name: ge-0/0/0.2
    - name: ge-0/0/0.3
    - name: ge-0/0/1.1
    - name: ge-0/0/1.2
    - name: ge-0/0/1.3
    routing_options:
      static:
        route:
        - name: 0.0.0.0/0
          discard: true
    protocols:
      ospf:
        export: ospf-default
        area:
        - name: 0.0.0.0
          interface:
          - name: ge-0/0/0.1
          - name: ge-0/0/1.1
          - name: ge-0/0/0.2
          - name: ge-0/0/1.2
          - name: ge-0/0/0.3
          - name: ge-0/0/1.3
