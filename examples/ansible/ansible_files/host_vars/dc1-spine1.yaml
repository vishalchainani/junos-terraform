system:
  host_name: dc1-spine1
interfaces:
  interface:
  - name: xe-0/0/0
    description: '*** to dc1-borderleaf1 ***'
    unit:
    - name: '0'
      family:
        inet:
          address:
          - name: 10.30.131.1/30
  - name: xe-0/0/1
    description: '*** to dc1-borderleaf2 ***'
    unit:
    - name: '0'
      family:
        inet:
          address:
          - name: 10.30.132.1/30
  - name: xe-0/0/2
    description: '*** to dc1-leaf1 ***'
    unit:
    - name: '0'
      family:
        inet:
          address:
          - name: 10.30.135.1/30
  - name: xe-0/0/3
    description: '*** to dc1-leaf2 ***'
    unit:
    - name: '0'
      family:
        inet:
          address:
          - name: 10.30.136.1/30
  - name: xe-0/0/4
    description: '*** to dc1-leaf3 ***'
    unit:
    - name: '0'
      family:
        inet:
          address:
          - name: 10.30.137.1/30
  - name: em0
    unit:
    - name: '0'
      description: '*** management ***'
      family:
        inet:
          address:
          - name: 100.123.24.3/16
  - name: em1
    unit:
    - name: '0'
      description: '*** to pfe ***'
      family:
        inet:
          address:
          - name: 169.254.0.2/24
  - name: lo0
    unit:
    - name: '0'
      description: '*** loopback ***'
      family:
        inet:
          address:
          - name: 10.30.100.3/32
routing_options:
  router_id: 10.30.100.3
protocols:
  bgp:
    group:
    - name: EVPN_iBGP
      type: internal
      local_address: 10.30.100.3
      family:
        evpn:
          signaling: ''
      cluster: 10.30.100.3
      local_as:
        as_number: '65200'
      multipath: ''
      allow: 10.30.100.0/24
      neighbor:
      - name: 10.30.100.4
    - name: IPCLOS_eBGP
      type: external
      mtu_discovery: true
      import: IPCLOS_BGP_IMP
      export: IPCLOS_BGP_EXP
      vpn_apply_export: true
      local_as:
        as_number: '65501'
      multipath:
        multiple_as: true
      bfd_liveness_detection:
        minimum_interval: '1000'
        multiplier: '3'
      neighbor:
      - name: 10.30.135.2
        description: EBGP peering to 10.30.135.2
        peer_as: '65503'
      - name: 10.30.136.2
        description: EBGP peering to 10.30.136.2
        peer_as: '65504'
      - name: 10.30.137.2
        description: EBGP peering to 10.30.137.2
        peer_as: '65505'
      - name: 10.30.131.2
        description: EBGP peering to 10.30.131.2
        peer_as: '65506'
      - name: 10.30.132.2
        description: EBGP peering to 10.30.132.2
        peer_as: '65507'
policy_options:
  policy_statement:
  - name: IPCLOS_BGP_EXP
    term:
    - name: loopback
      from:
        protocol: bgp
      then:
        community:
        - add: true
          community_name: dc1-spine1
        accept: true
    - name: default
      then:
        reject: true
  - name: IPCLOS_BGP_IMP
    term:
    - name: loopback
      from:
        protocol: direct
      then:
        accept: true
    - name: default
      then:
        reject: true
  - name: PFE-LB
    then:
      load_balance:
        per_packet: true
  community:
  - name: dc1-spine1
    members: '65501:1'
