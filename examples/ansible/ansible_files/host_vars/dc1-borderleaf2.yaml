system:
  host_name: dc1-borderleaf2
  _merge_directive: merge_recursive
interfaces:
  interface:
  - description: '*** to dc1-spine1 ***'
    unit:
    - family:
        inet:
          address:
          - name: 10.30.132.2/30
      name: '0'
    name: xe-0/0/0
  - description: '*** to dc1-spine2 ***'
    unit:
    - family:
        inet:
          address:
          - name: 10.30.142.2/30
      name: '0'
    name: xe-0/0/1
  - vlan_tagging: true
    unit:
    - name: '1'
      vlan_id: '1'
      family:
        inet:
          address:
          - name: 10.97.1.1/30
    - name: '2'
      vlan_id: '2'
      family:
        inet:
          address:
          - name: 10.97.2.1/30
    - name: '3'
      vlan_id: '3'
      family:
        inet:
          address:
          - name: 10.97.3.1/30
    name: xe-0/0/2
  - name: xe-0/0/3
    vlan_tagging: true
    unit:
    - name: '1'
      vlan_id: '1'
      family:
        inet:
          address:
          - name: 10.96.1.1/30
    - name: '2'
      vlan_id: '2'
      family:
        inet:
          address:
          - name: 10.96.2.1/30
    - name: '3'
      vlan_id: '3'
      family:
        inet:
          address:
          - name: 10.96.3.1/30
  - name: xe-0/0/4
    description: '*** to wan-pe1 ***'
    unit:
    - name: '0'
      family:
        inet:
          address:
          - name: 10.32.10.1/30
  - unit:
    - description: '*** management ***'
      family:
        inet:
          address:
          - name: 100.123.24.2/16
      name: '0'
    name: em0
  - name: em1
    unit:
    - name: '0'
      description: '*** to pfe ***'
      family:
        inet:
          address:
          - name: 169.254.0.2/24
  - unit:
    - description: '*** loopback ***'
      family:
        inet:
          address:
          - name: 10.30.100.2/32
      name: '0'
    - name: '10001'
      description: Loopback for VXLAN control packets for VRF_10001
      family:
        inet:
          address:
          - name: 10.40.100.2/32
    - name: '10002'
      description: Loopback for VXLAN control packets for VRF_10002
      family:
        inet:
          address:
          - name: 10.40.100.7/32
    - name: '10003'
      description: Loopback for VXLAN control packets for VRF_10003
      family:
        inet:
          address:
          - name: 10.40.100.12/32
    name: lo0
  _merge_list_directives:
    interface:
      _merge_directive: merge_by_key
      _merge_key: name
  _merge_directive: merge_recursive
routing_options:
  router_id: 10.30.100.2
  forwarding_table:
    chained_composite_next_hop:
      ingress:
        evpn: true
    _merge_directive: merge_recursive
  _merge_directive: merge_recursive
protocols:
  bgp:
    group:
    - name: WAN_OVERLAY_eBGP
      type: external
      multihop:
        no_nexthop_change: true
      local_address: 10.30.100.2
      family:
        evpn:
          signaling:
            delay_route_advertisements:
              minimum_delay:
                routing_uptime: '480'
      local_as:
        as_number: '65200'
      multipath:
        multiple_as: true
      neighbor:
      - name: 10.30.100.8
        description: DCI EBGP peering to 10.30.100.8
        peer_as: '65201'
      - name: 10.30.100.9
        description: DCI EBGP peering to 10.30.100.9
        peer_as: '65201'
    - type: internal
      local_address: 10.30.100.2
      family:
        evpn:
          signaling: ''
      cluster: 10.30.100.2
      local_as:
        as_number: '65200'
      multipath: ''
      neighbor:
      - name: 10.30.100.3
      - name: 10.30.100.4
      name: EVPN_iBGP
    - type: external
      mtu_discovery: true
      import: IPCLOS_BGP_IMP
      export: IPCLOS_BGP_EXP
      vpn_apply_export: true
      local_as:
        as_number: '65507'
      multipath:
        multiple_as: true
      bfd_liveness_detection:
        minimum_interval: '1000'
        multiplier: '3'
      neighbor:
      - name: 10.30.132.1
        description: EBGP peering to 10.30.132.1
        peer_as: '65501'
      - name: 10.30.142.1
        description: EBGP peering to 10.30.142.1
        peer_as: '65502'
      - name: 10.32.10.2
        description: EBGP peering to 10.32.10.2
        peer_as: '65400'
      name: IPCLOS_eBGP
    _merge_list_directives:
      group:
        _merge_directive: merge_by_key
        _merge_key: name
    _merge_directive: merge_recursive
  evpn:
    encapsulation: vxlan
    multicast_mode: ingress-replication
    default_gateway: do-not-advertise
  _merge_directive: merge_recursive
policy_options:
  policy_statement:
  - name: EVPN_T5_EXPORT
    term:
    - name: fm_direct
      from:
        protocol: direct
      then:
        accept: true
    - name: fm_static
      from:
        protocol: static
      then:
        accept: true
    - name: fm_v4_default
      from:
        protocol: ospf
        route_filter:
        - address: 0.0.0.0/0
          exact: true
      then:
        accept: true
    - name: fm_v6_host
      from:
        protocol: evpn
        route_filter:
        - address: 0::0/0
          prefix_length_range: /128-/128
      then:
        accept: true
  - term:
    - from:
        protocol: bgp
      then:
        community:
        - community_name: dc1-borderleaf2
          add: true
        accept: true
      name: loopback
    - name: default
      then:
        reject: true
    name: IPCLOS_BGP_EXP
  - name: IPCLOS_BGP_IMP
    term:
    - name: loopback
      from:
        protocol: direct
      then:
        accept: true
    - name: default
      then:
        reject: true
  - name: PFE-LB
    then:
      load_balance:
        per_packet: true
  - name: to-ospf
    term:
    - name: '10'
      from:
        protocol: evpn
      then:
        accept: true
    - name: '100'
      then:
        reject: true
  community:
  - name: dc1-borderleaf2
    members: '65507:1'
  _merge_list_directives:
    policy_statement:
      _merge_directive: merge_by_key
      _merge_key: name
  _merge_directive: merge_recursive
routing_instances:
  instance:
  - name: VRF_10001
    instance_type: vrf
    interface:
    - name: xe-0/0/2.1
    - name: xe-0/0/3.1
    - name: lo0.10001
    route_distinguisher:
      rd_type: 10.40.100.2:10001
    vrf_target:
      community: target:1:10001
    vrf_table_label: ''
    routing_options:
      auto_export: ''
    protocols:
      ospf:
        export: to-ospf
        area:
        - name: 0.0.0.0
          interface:
          - name: xe-0/0/2.1
            metric: '100'
          - name: xe-0/0/3.1
            metric: '200'
      evpn:
        ip_prefix_routes:
          advertise: direct-nexthop
          encapsulation: vxlan
          vni: '10001'
          export: EVPN_T5_EXPORT
  - name: VRF_10002
    instance_type: vrf
    interface:
    - name: xe-0/0/2.2
    - name: xe-0/0/3.2
    - name: lo0.10002
    route_distinguisher:
      rd_type: 10.40.100.7:10002
    vrf_target:
      community: target:1:10002
    vrf_table_label: ''
    routing_options:
      auto_export: ''
    protocols:
      ospf:
        export: to-ospf
        area:
        - name: 0.0.0.0
          interface:
          - name: xe-0/0/2.2
            metric: '100'
          - name: xe-0/0/3.2
            metric: '200'
      evpn:
        ip_prefix_routes:
          advertise: direct-nexthop
          encapsulation: vxlan
          vni: '10002'
          export: EVPN_T5_EXPORT
  - name: VRF_10003
    instance_type: vrf
    interface:
    - name: xe-0/0/2.3
    - name: xe-0/0/3.3
    - name: lo0.10003
    route_distinguisher:
      rd_type: 10.40.100.12:10003
    vrf_target:
      community: target:1:10003
    vrf_table_label: ''
    routing_options:
      auto_export: ''
    protocols:
      ospf:
        export: to-ospf
        area:
        - name: 0.0.0.0
          interface:
          - name: xe-0/0/2.3
            metric: '100'
          - name: xe-0/0/3.3
            metric: '200'
      evpn:
        ip_prefix_routes:
          advertise: direct-nexthop
          encapsulation: vxlan
          vni: '10003'
          export: EVPN_T5_EXPORT
switch_options:
  vtep_source_interface:
    interface_name: lo0.0
  route_distinguisher:
    rd_type: 10.30.100.2:9999
  vrf_target:
    community: target:9999:9999
    auto: ''
_merge_directive: merge_recursive
